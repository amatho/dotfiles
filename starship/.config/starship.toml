format = """
$username\
$hostname\
$localip\
$directory\
${custom.jj_bookmarks}\
${custom.jj_status}\
${custom.git_branch}\
${custom.git_commit}\
$git_state\
${custom.git_metrics}\
${custom.git_status}\
$memory_usage\
$aws\
$kubernetes\
$direnv\
$env_var\
$custom\
$sudo\
$line_break\
$jobs\
$battery\
$time\
$status\
$os\
$shell\
$character"""

[custom.jj_bookmarks]
command = '''
bookmarks=$(jj log --revisions 'heads(::@ & (bookmarks() | remote_bookmarks()))' --ignore-working-copy --no-graph --template 'bookmarks ++ "\n"')
bookmark_len=$(echo "$bookmarks" | wc -l | tr -d '[:space:]')
if [ $bookmark_len -gt 1 ]; then
  printf "$bookmark_len bookmarks"
  case "$bookmarks" in
    *"*"*) printf "*" ;;
  esac
else
  echo "$bookmarks"
fi
'''
shell = ['sh']
when = "jj --ignore-working-copy root"
format = '(\[[$output]($style)\])'
style = "bold purple"

[custom.jj_status]
command = '''
jj log --revisions @ --limit 1 --ignore-working-copy --no-graph --template 'if(!empty, "+")'
'''
shell = ['sh']
when = "jj --ignore-working-copy root"
format = '(\[[$output]($style)\])'
style = "bold red"

[custom.git_status]
when = "! jj --ignore-working-copy root"
command = "starship module git_status"
shell = ['sh']
style = "" # This disables the default "(bold green)" style
description = "Only show git_status if we're not in a jj repo"

[custom.git_commit]
when = "! jj --ignore-working-copy root"
command = "starship module git_commit"
shell = ['sh']
style = ""
description = "Only show git_commit if we're not in a jj repo"

[custom.git_metrics]
when = "! jj --ignore-working-copy root"
command = "starship module git_metrics"
shell = ['sh']
description = "Only show git_metrics if we're not in a jj repo"
style = ""

[custom.git_branch]
when = "! jj --ignore-working-copy root"
command = "starship module git_branch"
shell = ['sh']
description = "Only show git_branch if we're not in a jj repo"
style = ""

